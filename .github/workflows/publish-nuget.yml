name: Publish NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version, example: 1.1.0"
        required: true
        default: "1.1.0"

  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Determine package version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Publishing version $VERSION"

      - name: Restore
        run: dotnet restore ./SDKSimpleFactura/SDKSimpleFactura.csproj

      - name: Build
        run: dotnet build ./SDKSimpleFactura/SDKSimpleFactura.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack ./SDKSimpleFactura/SDKSimpleFactura.csproj -c Release -o ./artifacts --no-build /p:PackageVersion=${{ env.PACKAGE_VERSION }} /p:Version=${{ env.PACKAGE_VERSION }}

      - name: NuGet login with Trusted Publishing
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet.org
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
